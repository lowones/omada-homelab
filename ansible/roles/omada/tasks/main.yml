---
- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add ubuntu user to docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

- name: Create omada directory
  ansible.builtin.file:
    path: "{{ omada_install_dir }}"
    state: directory
    mode: "0755"

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ omada_install_dir }}/docker-compose.yml"
    mode: "0644"

- name: Pull and start the controller
  community.docker.docker_compose_v2:
    project_src: "{{ omada_install_dir }}"
    pull: always
    state: present

- name: Wait for Omada management UI to answer HTTPS
  ansible.builtin.uri:
    url: https://127.0.0.1:8043/
    validate_certs: false
    status_code: [200, 302]
  register: omada_health
  retries: 40
  delay: 15
  until: omada_health.status in [200, 302]
